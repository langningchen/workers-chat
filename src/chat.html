<!DOCTYPE html>
<html>

<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/dompurify/3.0.3/purify.min.js"></script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.css">
  <script src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/contrib/mhchem.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/marked-katex-extension/lib/index.umd.js"></script>
  <script>
    window.onload = () => {
      if (window.marked && window.markedKatex) {
        window.marked.use(window.markedKatex({ throwOnError: false }));
      }
    };
  </script>
  <style type="text/css">
    * {
      box-sizing: border-box;
    }

    body {
      font-family: Arial, Helvetica, sans-serif;
      margin: 0;
      padding: 0;
      background-color: #f9f9f9;
    }

    #chatlog {
      position: fixed;
      top: 0;
      bottom: 32px;
      left: 0;
      right: 200px;
      overflow-y: auto;
      padding: 8px;
      overflow-wrap: break-word;
      background-color: #fff;
    }

    #chatlog span.username {
      font-weight: bold;
    }

    #chatlog span.username.clickable:hover {
      text-decoration: underline;
    }

    #spacer {
      height: calc(100vh - 32px - 5em);
    }

    #roster {
      position: fixed;
      right: 0;
      top: 0;
      bottom: 32px;
      width: 200px;
      border-left: 1px solid #eee;
      display: flex;
      flex-direction: column;
      background-color: #fafafa;
    }

    #roster-users {
      flex: 1;
      overflow-y: auto;
      padding: 8px;
      font-weight: bold;
    }

    #chatlog img {
      max-width: 100%;
      height: auto;
      vertical-align: middle;
    }

    ::-webkit-scrollbar {
      display: none;
    }

    @media(max-width:600px) {
      #roster {
        display: none;
      }

      #chatlog {
        right: 0;
      }
    }

    #chat-input {
      position: fixed;
      width: 100%;
      height: 32px;
      bottom: 0;
      left: 0;
      border: none;
      border-top: 1px solid #ccc;
      padding-left: 32px;
      outline: none;
      background-color: #fff;
    }

    #chatroom::before {
      z-index: 1;
      display: block;
      content: ">";
      position: fixed;
      bottom: 0;
      left: 0;
      width: 32px;
      height: 32px;
      line-height: 32px;
      text-align: center;
      font-weight: bold;
      color: #888;
    }

    /* Center Form Styles */
    .center-form-container {
      position: fixed;
      z-index: 3;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background-color: #fff;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    .center-form-container input,
    .center-form-container button {
      font-size: 1.2rem;
      margin: 8px 0;
      text-align: center;
      border: 1px solid #bbb;
      border-radius: 4px;
      width: 16em;
      max-width: 90vw;
      height: 2.5em;
    }

    .center-form-container button {
      background-color: #007bff;
      color: #fff;
      cursor: pointer;
      border: none;
    }

    .center-form-container button:hover {
      background-color: #0056b3;
    }

    .center-form-container h2 {
      margin-bottom: 20px;
      color: #333;
    }

    .center-form-container .hint {
      font-size: 0.9em;
      color: #666;
      margin-bottom: 10px;
    }

    .system-text {
      font-style: italic;
      color: #666;
    }

    .mention {
      background-color: #ffeb3b;
      padding: 2px 4px;
      border-radius: 4px;
      font-weight: bold;
      color: #000;
    }

    .msg-item {
      margin-bottom: 8px;
      line-height: 1.5;
    }

    #editing-indicator {
      position: fixed;
      bottom: 32px;
      left: 0;
      width: 100%;
      background: #ffeb3b;
      font-size: 0.8em;
      padding: 2px 8px;
      display: none;
      z-index: 2;
    }
  </style>
</head>

<body>
  <div id="name-form-container" class="center-form-container">
    <h2>Join Chat</h2>
    <form id="name-form" style="display:flex; flex-direction:column; align-items:center;">
      <input id="name-input" placeholder="Nickname" required autocomplete="username">
      <input id="password-input" type="password" placeholder="Password (Optional)" autocomplete="current-password">
      <button type="submit">Continue</button>
    </form>
  </div>

  <div id="room-form-container" class="center-form-container" style="display:none; z-index:2;">
    <h2>Select Room</h2>
    <form id="room-form" style="display:flex; flex-direction:column; align-items:center;">
      <input id="room-name" placeholder="Room name" required>
      <button type="submit" id="go-public">Join / Create Room</button>
    </form>
  </div>

  <form id="chatroom" action="/fake-form-action" style="display:none;">
    <div id="chatlog">
      <div id="spacer"></div>
    </div>
    <div id="roster">
      <div id="roster-users"></div>
    </div>
    <div id="editing-indicator">Editing message (Press Esc to cancel)</div>
    <input id="chat-input" placeholder="Type a message or /help" autocomplete="off">
  </form>

  <script type="text/javascript">
    let currentWebSocket = null;
    let isUsingSW = false;

    let nameFormContainer = document.querySelector("#name-form-container");
    let nameForm = document.querySelector("#name-form");
    let nameInput = document.querySelector("#name-input");
    let passwordInput = document.querySelector("#password-input");

    let roomFormContainer = document.querySelector("#room-form-container");
    let roomForm = document.querySelector("#room-form");
    let roomNameInput = document.querySelector("#room-name");

    let chatroom = document.querySelector("#chatroom");
    let chatlog = document.querySelector("#chatlog");
    let chatInput = document.querySelector("#chat-input");
    let rosterUsers = document.querySelector("#roster-users");
    let editingIndicator = document.querySelector("#editing-indicator");

    let isAtBottom = true;
    let username;
    let password;
    let roomname;
    let editingMsgId = null;

    let hostname = window.location.host;
    if (hostname == "") {
      hostname = "edge-chat-demo.cloudflareworkers.com";
    }
    const proto = document.location.protocol === "http:" ? "ws:" : "wss:";

    function startNameChooser() {
      let savedName = localStorage.getItem("chat_username");
      if (savedName) nameInput.value = savedName;

      nameForm.addEventListener("submit", event => {
        event.preventDefault();
        username = nameInput.value.trim();
        password = passwordInput.value;
        if (username.length > 0) {
          localStorage.setItem("chat_username", username);
          startRoomChooser();
        }
      });

      nameInput.addEventListener("input", event => {
        if (event.currentTarget.value.length > 32) {
          event.currentTarget.value = event.currentTarget.value.slice(0, 32);
        }
      });

      nameInput.focus();
    }

    function startRoomChooser() {
      nameFormContainer.style.display = "none";

      if (document.location.hash.length > 1) {
        roomname = document.location.hash.slice(1);
        startChat();
        return;
      }

      roomFormContainer.style.display = "flex";

      roomForm.addEventListener("submit", event => {
        event.preventDefault();
        roomname = roomNameInput.value.trim();
        if (roomname.length > 0) {
          startChat();
        }
      });

      roomNameInput.addEventListener("input", event => {
        if (event.currentTarget.value.length > 32) {
          event.currentTarget.value = event.currentTarget.value.slice(0, 32);
        }
      });

      roomNameInput.focus();
    }

    function startEditing(id, rawText) {
      editingMsgId = id;
      chatInput.value = rawText;
      chatInput.focus();
      editingIndicator.style.display = "block";
    }

    function cancelEditing() {
      editingMsgId = null;
      chatInput.value = "";
      editingIndicator.style.display = "none";
    }

    function startChat() {
      roomFormContainer.style.display = "none";
      chatroom.style.display = "block";

      roomname = roomname.replace(/[^a-zA-Z0-9_-]/g, "").replace(/_/g, "-").toLowerCase();

      if (roomname.length > 32 && !roomname.match(/^[0-9a-f]{64}$/)) {
        addChatMessage("System", "ERROR: Invalid room name.", Date.now(), null, false, true);
        return;
      }

      document.location.hash = "#" + roomname;

      chatInput.addEventListener("keydown", event => {
        if (event.keyCode == 38 && chatInput.value === "") { // UP arrow
          let myMsgs = document.querySelectorAll(`.msg-item[data-name="${username}"]`);
          if (myMsgs.length > 0) {
            let lastMsg = myMsgs[myMsgs.length - 1];
            let rawText = lastMsg.getAttribute("data-raw-text");
            let id = lastMsg.id.replace("msg_", "");
            startEditing(id, rawText);
            event.preventDefault();
          }
        } else if (event.keyCode == 27 && editingMsgId) { // ESC key
          cancelEditing();
          event.preventDefault();
        } else if (event.keyCode == 33) chatlog.scrollBy(0, -chatlog.clientHeight + 50);
        else if (event.keyCode == 34) chatlog.scrollBy(0, chatlog.clientHeight - 50);
      });

      chatroom.addEventListener("submit", event => {
        event.preventDefault();
        let text = chatInput.value.trim();
        if (text === "") return;

        if (text === "/clear") {
          document.querySelectorAll('.msg-item').forEach(e => e.remove());
          localStorage.setItem("clearedAt_" + roomname, Date.now());
          addChatMessage("System", "Chat history cleared locally.", Date.now(), null, false, true);
          cancelEditing();
          return;
        }
        if (text === "/help") {
          let helpText = "**Available Commands:**\n" +
            "`/nick <name>` - Change your nickname\n" +
            "`/clear` - Clear local chat history\n" +
            "`/help` - Show this help message\n\n" +
            "**Tips:**\n" +
            "- Click a user's name to mention them.\n" +
            "- Press **UP arrow** to edit your last message.\n" +
            "- Click an image to view it full screen.";
          addChatMessage("System", helpText, Date.now(), null, false, true);
          cancelEditing();
          return;
        }

        if (editingMsgId) {
          sendWsMessage({ edit: editingMsgId, text: text });
          cancelEditing();
        } else {
          sendWsMessage({ message: text });
          chatInput.value = "";
        }
        chatlog.scrollBy(0, 1e8);
      });

      chatInput.addEventListener("paste", async event => {
        let items = (event.clipboardData || event.originalEvent.clipboardData).items;
        for (let index in items) {
          let item = items[index];
          if (item.kind === 'file' && item.type.startsWith('image/')) {
            event.preventDefault();
            let blob = item.getAsFile();
            let reader = new FileReader();
            reader.onload = async (e) => {
              let base64 = e.target.result;
              chatInput.value += " (Uploading image...)";
              try {
                let response = await fetch('/upload', { method: 'POST', body: base64 });
                if (!response.ok) throw new Error("Server rejected upload");
                let imageId = await response.text();
                chatInput.value = chatInput.value.replace(" (Uploading image...)", `\n![](/${imageId})`);
              } catch (err) {
                chatInput.value = chatInput.value.replace(" (Uploading image...)", " (Upload failed)");
              }
            };
            reader.readAsDataURL(blob);
          }
        }
      });

      chatlog.addEventListener("scroll", event => {
        isAtBottom = chatlog.scrollTop + chatlog.clientHeight >= chatlog.scrollHeight;
      });

      chatInput.focus();
      document.body.addEventListener("click", event => {
        if (window.getSelection().toString() == "") chatInput.focus();
      });

      if ('visualViewport' in window) {
        window.visualViewport.addEventListener('resize', function (event) {
          if (isAtBottom) chatlog.scrollBy(0, 1e8);
        });
      }

      join();
    }

    function sendWsMessage(msgObj) {
      let msgStr = JSON.stringify(msgObj);
      if (isUsingSW) {
        navigator.serviceWorker.ready.then(reg => {
          if (reg.active) {
            reg.active.postMessage({
              type: 'WS_SEND', room: roomname, user: username, pass: password || '', host: hostname, proto: proto, data: msgStr
            });
          }
        });
      } else if (currentWebSocket) {
        currentWebSocket.send(msgStr);
      }
    }

    let lastSeenTimestamp = 0;
    let wroteWelcomeMessages = false;
    let pingInterval = null;

    async function join() {
      if ("Notification" in window && Notification.permission !== "granted" && Notification.permission !== "denied") {
        await Notification.requestPermission();
      }

      if ('serviceWorker' in navigator) {
        try {
          const reg = await navigator.serviceWorker.register('/sw.js');
          reg.update(); // Force update check

          navigator.serviceWorker.addEventListener('message', event => {
            if (event.data && event.data.type === 'WS_MSG' && event.data.room === roomname) {
              handleWsMessage(event.data.data);
            }
          });

          await navigator.serviceWorker.ready;

          const connectPayload = {
            type: 'CONNECT', room: roomname, user: username, pass: password || '', host: hostname, proto: proto, requestHistory: true
          };

          if (navigator.serviceWorker.controller) {
            navigator.serviceWorker.controller.postMessage(connectPayload);
          } else {
            reg.active.postMessage(connectPayload);
          }

          isUsingSW = true;

          if (pingInterval) clearInterval(pingInterval);
          pingInterval = setInterval(() => {
            if (navigator.serviceWorker.controller) {
              navigator.serviceWorker.controller.postMessage({
                type: 'CONNECT', room: roomname, user: username, pass: password || '', host: hostname, proto: proto, requestHistory: false
              });
            }
          }, 5000);

          return;
        } catch (e) {
          console.error("SW fallback:", e);
        }
      }

      fallbackJoin();
    }

    function fallbackJoin() {
      isUsingSW = false;
      const wss = proto === "ws:" ? "ws://" : "wss://";
      let ws = new WebSocket(wss + hostname + "/api/room/" + roomname + "/websocket");
      let rejoined = false;
      let startTime = Date.now();

      let rejoin = async () => {
        if (!rejoined) {
          rejoined = true;
          currentWebSocket = null;

          while (rosterUsers.firstChild) rosterUsers.removeChild(rosterUsers.firstChild);

          let timeSinceLastJoin = Date.now() - startTime;
          if (timeSinceLastJoin < 10000) {
            await new Promise(resolve => setTimeout(resolve, 10000 - timeSinceLastJoin));
          }

          fallbackJoin();
        }
      }

      ws.addEventListener("open", event => {
        currentWebSocket = ws;
        ws.send(JSON.stringify({ name: username, password: password }));

        if (pingInterval) clearInterval(pingInterval);
        pingInterval = setInterval(() => {
          if (ws.readyState === WebSocket.OPEN) ws.send("ping");
        }, 2000);
      });

      ws.addEventListener("message", event => {
        handleWsMessage(event.data);
      });

      ws.addEventListener("close", event => {
        if (pingInterval) clearInterval(pingInterval);
        rejoin();
      });
      ws.addEventListener("error", event => {
        if (pingInterval) clearInterval(pingInterval);
        rejoin();
      });
    }

    function handleWsMessage(dataStr) {
      if (dataStr === "pong") return;
      let data = JSON.parse(dataStr);
      let clearedAt = parseInt(localStorage.getItem("clearedAt_" + roomname)) || 0;

      if (data.error) {
        addChatMessage("System", "* Error: " + data.error, Date.now(), null, false, true);
        if (data.error === "Nickname already in use.") {
          setTimeout(() => location.reload(), 2000); // Reload to let them choose again
        }
      } else if (data.roster) {
        rosterUsers.innerHTML = "";
        data.roster.forEach(name => {
          let p = document.createElement("p");
          p.innerText = name;
          rosterUsers.appendChild(p);
        });
      } else if (data.joined) {
        let exists = Array.from(rosterUsers.childNodes).some(c => c.innerText === data.joined);
        if (!exists) {
          let p = document.createElement("p");
          p.innerText = data.joined;
          rosterUsers.appendChild(p);
        }
        if (data.timestamp >= clearedAt) {
          addChatMessage("System", `**${data.joined === username ? "You" : data.joined}** joined the room.`, data.timestamp, null, false, true);
        }
      } else if (data.nameChange) {
        if (data.timestamp >= clearedAt) {
          addChatMessage("System", `**${data.nameChange.old === username ? "You are" : data.nameChange.old}** is now known as **${data.nameChange.new}**.`, data.timestamp, null, false, true);
        }
        for (let child of rosterUsers.childNodes) {
          if (child.innerText == data.nameChange.old) {
            child.innerText = data.nameChange.new;
            break;
          }
        }
      } else if (data.quit) {
        for (let child of rosterUsers.childNodes) {
          if (child.innerText == data.quit) {
            rosterUsers.removeChild(child);
            break;
          }
        }
        if (data.timestamp >= clearedAt) {
          addChatMessage("System", `**${data.quit}** left the room.`, data.timestamp, null, false, true);
        }
      } else if (data.ready) {
        if (!wroteWelcomeMessages) {
          wroteWelcomeMessages = true;
          addChatMessage("System", `Welcome to **#${roomname}**. Type \`/help\` to view commands.`, Date.now(), null, false, true);
        }
      } else if (data.history) {
        document.querySelectorAll('.msg-item').forEach(e => e.remove());
        data.history.forEach(m => {
          if (m.timestamp >= clearedAt) {
            if (m.timestamp > lastSeenTimestamp) lastSeenTimestamp = m.timestamp;
            addChatMessage(m.name, m.message, m.timestamp, m.id, m.edited);
          }
        });
        setTimeout(() => chatlog.scrollBy(0, 1e8), 100);
      } else if (data.edited) {
        let msgDiv = document.getElementById("msg_" + data.edited);
        if (msgDiv) {
          renderMessageContent(msgDiv, msgDiv.getAttribute("data-name"), data.text, data.edited, true);
        }
      } else if (data.deleted) {
        let msgDiv = document.getElementById("msg_" + data.deleted);
        if (msgDiv) msgDiv.remove();
      } else {
        if (data.timestamp >= clearedAt && data.timestamp > lastSeenTimestamp) {
          addChatMessage(data.name, data.message, data.timestamp, data.id, data.edited);
          lastSeenTimestamp = data.timestamp;

          if (!isUsingSW && document.hidden && Notification.permission === "granted" && data.name !== username) {
            new Notification(data.name + " in #" + roomname, { icon: "/favicon.ico", body: data.message });
          }
        }
      }
    }

    function renderMessageContent(msgDiv, name, text, id, isEdited, isSystem = false) {
      let content = msgDiv.querySelector(".content");
      if (!content) return;
      msgDiv.setAttribute("data-raw-text", text);

      let html = window.marked ? window.marked.parse(text) : text;
      html = window.DOMPurify ? window.DOMPurify.sanitize(html) : html;

      if (isSystem) {
        content.innerHTML = html;
        content.classList.add("system-text");
      } else if (name) {
        if (html.includes(`@${username}`)) {
          let mentionRegex = new RegExp(`@${username}\\b`, 'gi');
          html = html.replace(mentionRegex, `<span class="mention">$&</span>`);
        }

        content.innerHTML = html;

        let actionsSpan = document.createElement("span");
        actionsSpan.style.display = "inline";
        actionsSpan.style.marginLeft = "8px";
        actionsSpan.style.fontSize = "0.8em";

        if (isEdited) {
          let editedSpan = document.createElement("span");
          editedSpan.innerText = "(edited) ";
          editedSpan.style.color = "#888";
          actionsSpan.appendChild(editedSpan);
        }

        if (name === username && id) {
          let editBtn = document.createElement("a");
          editBtn.innerText = "[Edit]";
          editBtn.href = "javascript:void(0)";
          editBtn.style.marginRight = "6px";
          editBtn.style.color = "#0066cc";
          editBtn.style.textDecoration = "none";
          editBtn.onclick = () => {
            let rawText = msgDiv.getAttribute("data-raw-text");
            startEditing(id, rawText);
          };

          let delBtn = document.createElement("a");
          delBtn.innerText = "[Delete]";
          delBtn.href = "javascript:void(0)";
          delBtn.style.color = "#cc0000";
          delBtn.style.textDecoration = "none";
          delBtn.onclick = () => {
            if (confirm("Delete this message?")) {
              sendWsMessage({ delete: id });
            }
          };

          actionsSpan.appendChild(editBtn);
          actionsSpan.appendChild(delBtn);
        }

        if (actionsSpan.hasChildNodes()) {
          content.appendChild(actionsSpan);
        }
      } else {
        content.innerText = text;
      }

      content.querySelectorAll('img').forEach(img => {
        img.style.cursor = "pointer";
        img.title = "Click to enlarge";
        img.onclick = () => {
          let overlay = document.createElement("div");
          overlay.style.position = "fixed";
          overlay.style.top = "0"; overlay.style.left = "0";
          overlay.style.width = "100%"; overlay.style.height = "100%";
          overlay.style.backgroundColor = "rgba(0,0,0,0.85)";
          overlay.style.zIndex = "1000";
          overlay.style.display = "flex";
          overlay.style.alignItems = "center";
          overlay.style.justifyContent = "center";
          overlay.style.cursor = "zoom-out";
          overlay.onclick = () => overlay.remove();

          let fullImg = document.createElement("img");
          fullImg.src = img.src;
          fullImg.style.maxWidth = "90%";
          fullImg.style.maxHeight = "90%";
          fullImg.style.borderRadius = "8px";
          fullImg.style.boxShadow = "0 4px 12px rgba(0,0,0,0.5)";
          overlay.appendChild(fullImg);
          document.body.appendChild(overlay);
        };
      });

      // Make ALL paragraphs strictly inline
      const paragraphs = content.querySelectorAll('p');
      paragraphs.forEach(pg => {
        pg.style.display = 'inline';
        pg.style.margin = '0';
        pg.style.padding = '0';
      });
    }

    function addChatMessage(name, text, timestamp, id, isEdited, isSystem = false) {
      let p = document.createElement("div");
      p.className = "msg-item";
      if (id) {
        p.id = "msg_" + id;
        p.setAttribute("data-name", name);
      }

      if (timestamp) {
        let timeTag = document.createElement("span");
        timeTag.style.display = "inline";
        timeTag.style.color = "#888";
        timeTag.style.fontSize = "0.8em";
        timeTag.style.marginRight = "8px";
        let date = new Date(timestamp);
        timeTag.innerText = `[${date.getHours().toString().padStart(2, '0')}:${date.getMinutes().toString().padStart(2, '0')}:${date.getSeconds().toString().padStart(2, '0')}]`;
        p.appendChild(timeTag);
      }

      if (name) {
        let tag = document.createElement("span");
        tag.className = "username";
        tag.style.display = "inline";
        tag.innerText = name + ": ";
        tag.style.marginRight = "4px";

        if (!isSystem) {
          tag.classList.add("clickable");
          tag.title = "Click to mention";
          tag.style.cursor = "pointer";
          tag.onclick = () => {
            chatInput.value += `@${name} `;
            chatInput.focus();
          };
        } else {
          tag.style.color = "#888";
        }

        p.appendChild(tag);
      }

      let content = document.createElement("div");
      content.className = "content";
      content.style.display = "inline";

      p.appendChild(content);

      chatlog.appendChild(p);

      renderMessageContent(p, name, text, id, isEdited, isSystem);

      if (isAtBottom) {
        chatlog.scrollBy(0, 1e8);
      }
    }

    startNameChooser();
  </script>
</body>

</html>
