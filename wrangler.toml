name = "chat"
compatibility_date = "2024-01-01"

main = "src/chat.mjs"

[durable_objects]
bindings = [
  { name = "rooms", class_name = "ChatRoom" },
]

[[rules]]
type = "Data"
globs = ["**/*.html"]
fallthrough = false

# Indicate that you want the ChatRoom classes to be callable as Durable Objects.
[[migrations]]
tag = "v1"                                       # Should be unique for each entry
new_sqlite_classes = ["ChatRoom"]

[vars]
GithubOwner = "langningchen"
GithubRepo = "workers-chat"
GithubPAT = "dummy"

